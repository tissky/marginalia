name: Release

# Triggers on release tags such as v0.2.0 and prerelease tags such as
# v0.2.4-rc.1.
#
# What it produces:
#   - Tauri desktop bundles for Windows, macOS, and Linux. Each desktop
#     runner prepares a self-contained python-build-standalone runtime under
#     desktop/src-tauri/resources/backend/ via scripts/prepare-backend.mjs,
#     so shipped bundles do not depend on a system Python.
#   - Windows portable zip packages in addition to NSIS installers.
#   - Native desktop bundles for Windows x64/arm64, macOS arm64, and
#     Linux x64/arm64.
#   - Linux AppImage artifacts in addition to .deb/.rpm. Linux desktop
#     bundles are built on Ubuntu 22.04 runners to keep the glibc baseline
#     compatible with Ubuntu 22.04-class systems. AppImage bundling sets
#     NO_STRIP=true to avoid linuxdeploy's bundled strip failing on modern ELF
#     relocation sections; see https://github.com/tauri-apps/tauri/issues/14796.
#   - A multi-arch Docker image pushed to ghcr.io/<owner>/marginalia and
#     tagged with the version and latest.
#
# Desktop matrix jobs build in parallel and upload workflow artifacts. The
# publish job is the only job that mutates the GitHub Release, which avoids
# draft-release races while keeping build parallelism.

on:
  push:
    tags: ["v*.*.*", "v*.*.*-*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  desktop:
    name: Tauri (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            platform: windows
            runner: windows-latest
            tauri_args: "--bundles nsis"
          - target: windows-arm64
            platform: windows
            runner: windows-11-arm
            tauri_args: "--bundles nsis"
          - target: macos-arm64
            platform: macos
            runner: macos-15
            tauri_args: "--bundles dmg"
          - target: linux-x64
            platform: linux
            runner: ubuntu-22.04
            tauri_args: "--bundles deb,rpm"
            appimage_arch: x86_64
          - target: linux-arm64
            platform: linux
            runner: ubuntu-22.04-arm
            tauri_args: "--bundles deb,rpm"
            appimage_arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
          cache-targets: false

      - name: Install Linux Tauri deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            desktop-file-utils \
            file \
            libgdk-pixbuf2.0-bin \
            libglib2.0-bin \
            libgtk-3-bin \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            patchelf \
            shared-mime-info \
            squashfs-tools

      - name: Install npm deps
        working-directory: desktop
        run: npm ci

      - name: Prepare backend sidecar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/prepare-backend.mjs

      - name: Build bundles
        if: matrix.platform != 'linux'
        working-directory: desktop
        run: npm run tauri:build -- --ci ${{ matrix.tauri_args }}

      - name: Build Linux deb/rpm bundles
        if: matrix.platform == 'linux'
        working-directory: desktop
        run: npm run tauri:build -- --ci ${{ matrix.tauri_args }}

      - name: Build Linux AppImage bundle
        if: matrix.platform == 'linux'
        shell: bash
        working-directory: desktop
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          ARCH: ${{ matrix.appimage_arch }}
          # linuxdeploy's bundled strip can fail on modern ELF .relr.dyn
          # sections. The linuxdeploy-supported NO_STRIP=true workaround keeps
          # AppImage bundling green; see tauri-apps/tauri#14796.
          NO_STRIP: "true"
        run: |
          set -euo pipefail
          backend_lib_dirs="$(
            find "$(realpath src-tauri/resources/backend)" \
              -type f \
              \( -name '*.so' -o -name '*.so.*' \) \
              -printf '%h\n' \
              | sort -u \
              | paste -sd ':'
          )"
          if [ -z "$backend_lib_dirs" ]; then
            echo "No bundled backend shared library directories found." >&2
            exit 1
          fi
          echo "Exposing $(printf '%s\n' "$backend_lib_dirs" | tr ':' '\n' | wc -l) bundled backend library directories to linuxdeploy."
          export LD_LIBRARY_PATH="$backend_lib_dirs${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          npm run tauri -- bundle --ci --bundles appimage --verbose

      - name: Package Windows portable zip
        if: matrix.platform == 'windows'
        run: node scripts/package-windows-portable.mjs

      - name: Normalize Windows portable zip name
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          $nsisDir = "desktop/src-tauri/target/release/bundle/nsis"
          $portables = @(Get-ChildItem -LiteralPath $nsisDir -Filter "*portable*.zip")
          if ($portables.Count -ne 1) {
            throw "Expected exactly one portable zip in $nsisDir, found $($portables.Count)."
          }
          $expected = [System.IO.Path]::GetFullPath(
            (Join-Path $nsisDir "marginalia-$env:TAG-$env:TARGET-portable.zip")
          )
          if ($portables[0].FullName -ne $expected) {
            Move-Item -LiteralPath $portables[0].FullName -Destination $expected -Force
          }

      - name: Stage Windows release assets
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          $out = "release-assets"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $nsisDir = "desktop/src-tauri/target/release/bundle/nsis"
          $setups = @(Get-ChildItem -LiteralPath $nsisDir -Filter "*.exe" |
            Where-Object { $_.Name -notmatch "portable" })
          if ($setups.Count -ne 1) {
            throw "Expected exactly one setup exe in $nsisDir, found $($setups.Count)."
          }
          Copy-Item -LiteralPath $setups[0].FullName `
            -Destination (Join-Path $out "marginalia-$env:TAG-$env:TARGET-setup.exe") `
            -Force
          $portables = @(Get-ChildItem -LiteralPath $nsisDir -Filter "*portable*.zip")
          if ($portables.Count -ne 1) {
            throw "Expected exactly one portable zip in $nsisDir, found $($portables.Count)."
          }
          Copy-Item -LiteralPath $portables[0].FullName `
            -Destination (Join-Path $out "marginalia-$env:TAG-$env:TARGET-portable.zip") `
            -Force

      - name: Stage macOS release assets
        if: matrix.platform == 'macos'
        shell: bash
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s nullglob
          dmgs=(desktop/src-tauri/target/release/bundle/dmg/*.dmg)
          if [ "${#dmgs[@]}" -ne 1 ]; then
            echo "Expected exactly one dmg, found ${#dmgs[@]}" >&2
            exit 1
          fi
          cp "${dmgs[0]}" "release-assets/marginalia-$TAG-$TARGET.dmg"

      - name: Stage Linux release assets
        if: matrix.platform == 'linux'
        shell: bash
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s nullglob
          debs=(desktop/src-tauri/target/release/bundle/deb/*.deb)
          rpms=(desktop/src-tauri/target/release/bundle/rpm/*.rpm)
          appimages=(
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/appimage/*.appimage
          )
          if [ "${#debs[@]}" -ne 1 ]; then
            echo "Expected exactly one deb, found ${#debs[@]}" >&2
            exit 1
          fi
          if [ "${#rpms[@]}" -ne 1 ]; then
            echo "Expected exactly one rpm, found ${#rpms[@]}" >&2
            exit 1
          fi
          if [ "${#appimages[@]}" -ne 1 ]; then
            echo "Expected exactly one AppImage, found ${#appimages[@]}" >&2
            exit 1
          fi
          cp "${debs[0]}" "release-assets/marginalia-$TAG-$TARGET.deb"
          cp "${rpms[0]}" "release-assets/marginalia-$TAG-$TARGET.rpm"
          cp "${appimages[0]}" "release-assets/marginalia-$TAG-$TARGET.AppImage"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Docker image (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/marginalia
          tags: |
            type=ref,event=tag
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ (github.event_name == 'push' && !contains(github.ref_name, '-')) || (github.event_name == 'workflow_dispatch' && !contains(github.event.inputs.tag, '-')) }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APT_MIRROR=
            PIP_INDEX_URL=https://pypi.org/simple
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-release:
    name: Publish GitHub Release
    needs: [desktop, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-assets
          merge-multiple: true

      - name: Write release notes
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          awk -v version="$VERSION" '
            $0 ~ "^## " version "([[:space:]]|$)" { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-changelog.md

          if [ ! -s release-changelog.md ] && [[ "$TAG" == *-* ]]; then
            awk '
              $0 ~ "^## Unreleased([[:space:]]|$)" { found = 1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md > release-changelog.md
          fi

          {
            echo "## Highlights"
            echo
            if [ -s release-changelog.md ]; then
              awk '
                /^### / { next }
                { print }
              ' release-changelog.md
            else
              echo "- Desktop bundles built from \`$TAG\`."
            fi
            cat <<EOF

          ## Artifacts

          Desktop bundles built from \`$TAG\`.
          Desktop targets: Windows x64/arm64, macOS arm64, Linux x64/arm64.
          Linux targets include .deb, .rpm, and AppImage assets built on Ubuntu 22.04 runners.
          Each bundle ships a self-contained Python runtime; no system Python required.
          Docker image: \`ghcr.io/${{ github.repository_owner }}/marginalia:$TAG\` (linux/amd64, linux/arm64)

          ## First-Launch Notes For Unsigned Binaries

          - Windows: SmartScreen may say "Windows protected your PC". Click "More info" and then "Run anyway".
          - macOS: Gatekeeper may refuse to open the .dmg. Run \`xattr -dr com.apple.quarantine /Applications/Marginalia.app\` after dragging it across.
          EOF
          } > release-notes.md

      - name: Verify built assets
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          expected=(
            "marginalia-$TAG-windows-x64-setup.exe"
            "marginalia-$TAG-windows-x64-portable.zip"
            "marginalia-$TAG-windows-arm64-setup.exe"
            "marginalia-$TAG-windows-arm64-portable.zip"
            "marginalia-$TAG-macos-arm64.dmg"
            "marginalia-$TAG-linux-x64.deb"
            "marginalia-$TAG-linux-x64.rpm"
            "marginalia-$TAG-linux-x64.AppImage"
            "marginalia-$TAG-linux-arm64.deb"
            "marginalia-$TAG-linux-arm64.rpm"
            "marginalia-$TAG-linux-arm64.AppImage"
          )
          assets="$(find release-assets -maxdepth 1 -type f -printf '%f\n' | sort)"
          missing=0
          for asset in "${expected[@]}"; do
            if ! grep -Fxq "$asset" <<< "$assets"; then
              echo "::error::Missing built asset: $asset"
              missing=1
            fi
          done
          count="$(printf '%s\n' "$assets" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [ "$count" -ne "${#expected[@]}" ]; then
            echo "::error::Expected ${#expected[@]} built assets, found $count"
            missing=1
          fi
          exit "$missing"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes
          fi
          release_flags=(--latest)
          if [[ "$TAG" == *-* ]]; then
            release_flags=(--prerelease --latest=false)
          fi
          gh release create "$TAG" release-assets/* \
            --title "Marginalia $TAG" \
            --notes-file release-notes.md \
            "${release_flags[@]}"

      - name: Verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          expected=(
            "marginalia-$TAG-windows-x64-setup.exe"
            "marginalia-$TAG-windows-x64-portable.zip"
            "marginalia-$TAG-windows-arm64-setup.exe"
            "marginalia-$TAG-windows-arm64-portable.zip"
            "marginalia-$TAG-macos-arm64.dmg"
            "marginalia-$TAG-linux-x64.deb"
            "marginalia-$TAG-linux-x64.rpm"
            "marginalia-$TAG-linux-x64.AppImage"
            "marginalia-$TAG-linux-arm64.deb"
            "marginalia-$TAG-linux-arm64.rpm"
            "marginalia-$TAG-linux-arm64.AppImage"
          )
          assets="$(gh release view "$TAG" --json assets --jq '.assets[].name')"
          missing=0
          for asset in "${expected[@]}"; do
            if ! grep -Fxq "$asset" <<< "$assets"; then
              echo "::error::Missing release asset: $asset"
              missing=1
            fi
          done
          count="$(printf '%s\n' "$assets" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [ "$count" -ne "${#expected[@]}" ]; then
            echo "::error::Expected ${#expected[@]} release assets, found $count"
            missing=1
          fi
          exit "$missing"
