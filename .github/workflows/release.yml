name: Release

# Triggers on tags matching v*.*.* (e.g. v0.2.0). What it produces:
#   - Tauri desktop bundles for Windows / macOS / Linux, attached to a
#     GitHub Release. Each runner first prepares a self-contained
#     python-build-standalone runtime under
#     desktop/src-tauri/resources/backend/ via scripts/prepare-backend.mjs,
#     so the shipped bundles do NOT depend on a system Python.
#   - A portable .zip on Windows in addition to the NSIS installer.
#   - Native desktop bundles for Windows x64/arm64, macOS arm64, and
#     Linux x64/arm64.
#   - A multi-arch Docker image pushed to ghcr.io/<owner>/marginalia
#     tagged with the version and `latest`.
#
# Tag-driven releases keep the version in tauri.conf.json + pyproject.toml
# in lockstep with the binary names. To cut a release:
#   git tag v0.2.0 && git push origin v0.2.0
#
# A `workflow_dispatch` is also wired so we can re-run a release without
# moving a tag if a runner had a transient failure.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write   # create release, upload assets
  packages: write   # push to ghcr.io

jobs:
  # ---- 1. Tauri desktop bundles ----------------------------------------------
  desktop:
    name: Tauri (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            platform: windows
            runner: windows-latest
            tauri_args: "--bundles nsis"
          - target: windows-arm64
            platform: windows
            runner: windows-11-arm
            tauri_args: "--bundles nsis"
          # Apple Silicon only — we don't have an Apple Developer account,
          # so x86_64 dmg signing is moot, and Apple Silicon Macs are the
          # overwhelming share of new macOS hardware.
          - target: macos-arm64
            platform: macos
            runner: macos-15
            tauri_args: "--bundles dmg"
          - target: linux-x64
            platform: linux
            runner: ubuntu-latest
            # AppImage is intentionally dropped: linuxdeploy chokes on the
            # bundled python runtime's thousands of .so files. deb + rpm
            # cover the supported distros without the fragility.
            tauri_args: "--bundles deb,rpm"
          - target: linux-arm64
            platform: linux
            runner: ubuntu-24.04-arm
            # AppImage is intentionally dropped: linuxdeploy chokes on the
            # bundled python runtime's thousands of .so files. deb + rpm
            # cover the supported distros without the fragility.
            tauri_args: "--bundles deb,rpm"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      # The pip install . step inside prepare-backend.mjs needs a host
      # Python to bootstrap; the standalone interpreter only takes over
      # afterwards. Any 3.11+ works.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install Linux Tauri deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm deps
        working-directory: desktop
        run: npm ci

      # Download python-build-standalone, pip-install marginalia into it,
      # and stage the result at desktop/src-tauri/resources/backend/.
      # tauri.conf.json's bundle.resources picks that directory up.
      - name: Prepare backend sidecar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/prepare-backend.mjs

      # tauri-action drives `tauri build`, picks the right bundle targets
      # for the host OS, and uploads artifacts to a draft release. We let
      # it create / amend the draft so all matrix legs converge on one
      # Release page. tauri.conf.json's beforeBuildCommand runs the
      # frontend build; the sidecar resource is already on disk by now.
      - name: Build & upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Marginalia ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            Desktop bundles built from `${{ github.event.inputs.tag || github.ref_name }}`.
            Desktop targets: Windows x64/arm64, macOS arm64, Linux x64/arm64.
            Each bundle ships a self-contained Python runtime — no system Python required.
            Docker image: `ghcr.io/${{ github.repository_owner }}/marginalia:${{ github.event.inputs.tag || github.ref_name }}` (linux/amd64, linux/arm64)

            **First-launch notes for unsigned binaries:**
            - Windows: SmartScreen will say "Windows protected your PC". Click "More info" → "Run anyway".
            - macOS: Gatekeeper will refuse to open the .dmg. Run `xattr -dr com.apple.quarantine /Applications/Marginalia.app` after dragging it across.
          releaseDraft: true
          prerelease: false
          releaseAssetNamePattern: "marginalia-v[version]-${{ matrix.target }}[setup][ext]"
          args: ${{ matrix.tauri_args || '' }}

      # Build the portable .zip after the NSIS installer is on disk so
      # we can reuse the same target/release/ tree NSIS was assembled
      # from. The zip lands inside bundle/nsis/ and is normalized before upload.
      - name: Package Windows portable zip
        if: matrix.platform == 'windows'
        run: node scripts/package-windows-portable.mjs

      - name: Normalize Windows portable zip name
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          $nsisDir = "desktop/src-tauri/target/release/bundle/nsis"
          $portables = @(Get-ChildItem -LiteralPath $nsisDir -Filter "*portable*.zip")
          if ($portables.Count -ne 1) {
            throw "Expected exactly one portable zip in $nsisDir, found $($portables.Count)."
          }
          $expected = [System.IO.Path]::GetFullPath(
            (Join-Path $nsisDir "marginalia-$env:TAG-$env:TARGET-portable.zip")
          )
          if ($portables[0].FullName -ne $expected) {
            Move-Item -LiteralPath $portables[0].FullName -Destination $expected -Force
          }

      - name: Upload Windows portable zip
        if: matrix.platform == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: true
          fail_on_unmatched_files: true
          files: desktop/src-tauri/target/release/bundle/nsis/*portable*.zip

  # ---- 2. Docker image to ghcr.io --------------------------------------------
  docker:
    name: Docker image (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/marginalia
          tags: |
            type=ref,event=tag
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}

      # Override the in-Dockerfile mainland-China mirrors with upstream
      # Debian / PyPI for public release builds. The Dockerfile keeps the
      # Tsinghua defaults so local `docker build` from a CN dev machine
      # stays fast.
      # py7zz is pinned to fork-built platform wheels in pyproject.toml,
      # including linux/aarch64, so the backend can now install under both
      # Docker targets.
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APT_MIRROR=
            PIP_INDEX_URL=https://pypi.org/simple
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- 3. Promote draft release to published ---------------------------------
  publish-release:
    name: Publish GitHub Release
    needs: [desktop, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # tauri-action created a draft; flip it to published once Docker is
      # also available, so users never see a release whose Docker tag
      # 404s. We can't use `gh api repos/.../releases/tags/<tag>` here:
      # that endpoint 404s on drafts (drafts aren't bound to a tag yet),
      # which is what tripped the v0.1.0 publish. `gh release edit`
      # resolves drafts by name, so it works on both states.
      - name: Publish draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: gh release edit "$TAG" --draft=false --latest
